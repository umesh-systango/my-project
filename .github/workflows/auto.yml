
name: Auto DevOps

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Login to ACR
      run: |
        echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_LOGIN_SERVER }}         -u ${{ secrets.ACR_USERNAME }} --password-stdin

    - name: Build Image
      run: docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/auto-app:${{ github.sha }} .

    - name: Push Image
      run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/auto-app:${{ github.sha }}
